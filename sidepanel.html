<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowAgent</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="topbar-main">
          <div class="brand">FlowAgent</div>
          <div class="segmented-tabs" role="tablist" aria-label="FlowAgent views">
            <button id="tab-workflows" class="tab-button active" type="button" role="tab" aria-selected="true">Workflows</button>
            <button id="tab-copilot" class="tab-button" type="button" role="tab" aria-selected="false">Copilot</button>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="model-pill" class="model-pill" type="button" aria-label="Active model"></button>
          <button id="utility-toggle" class="icon-button" type="button" aria-label="Open utility menu">...</button>
        </div>

        <div id="utility-menu" class="utility-menu" hidden>
          <div class="utility-copy">
            <p id="utility-state" class="utility-state">No active provider</p>
          </div>

          <label class="utility-field">
            <span>Account</span>
            <select id="account-select" class="chrome-select" aria-label="Provider account"></select>
          </label>

          <label class="utility-field">
            <span>Model</span>
            <select id="model-select" class="chrome-select" aria-label="Model selection"></select>
          </label>

          <div class="utility-actions">
            <button id="keys-button" class="chrome-button" type="button">Manage Keys</button>
            <button id="memory-window" class="chrome-button" type="button">Open Memory</button>
          </div>
        </div>
      </header>

      <section id="workflows-pane" class="pane" aria-live="polite"></section>
      <section id="copilot-pane" class="pane" aria-live="polite" hidden></section>

      <div id="account-sheet" class="sheet-backdrop" hidden>
        <section class="sheet">
          <div class="sheet-header">
            <div>
              <p class="eyebrow">Provider Accounts</p>
              <h2>Manage local keys</h2>
            </div>
            <button id="close-sheet" class="chrome-button" type="button" aria-label="Close">Done</button>
          </div>

          <div id="account-list" class="account-list"></div>

          <form id="account-form" class="account-form">
            <div class="field-grid">
              <label class="field">
                <span>Provider</span>
                <select id="account-provider">
                  <option value="openai">OpenAI</option>
                  <option value="gemini">Google Gemini</option>
                  <option value="claude">Claude</option>
                  <option value="nvidia">NVIDIA</option>
                </select>
              </label>
              <label class="field">
                <span>Label</span>
                <input id="account-label" type="text" placeholder="Work OpenAI" />
              </label>
            </div>

            <label class="field">
              <span>API key</span>
              <input id="account-key" type="password" placeholder="Paste API key" />
            </label>

            <label class="field">
              <span>Base URL</span>
              <input id="account-base-url" type="text" placeholder="Optional override" />
            </label>

            <div class="field-grid">
              <label class="field">
                <span>Max output tokens</span>
                <input id="settings-max-output-tokens" type="number" min="64" step="1" />
              </label>
              <label class="field">
                <span>Prompt suffix</span>
                <input id="settings-prompt-suffix" type="text" placeholder="Optional planning hint" />
              </label>
            </div>

            <div class="sheet-actions">
              <button id="save-account" class="primary-button" type="submit">Save account</button>
              <button id="refresh-models" class="chrome-button" type="button">Refresh models</button>
              <span id="sheet-status" class="status-pill muted">Ready</span>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
