<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlowAgent</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="workspace">
      <header class="topbar">
        <div class="topbar-group">
          <button id="new-chat" class="icon-button ghost" type="button" aria-label="New chat">+</button>
          <select id="account-select" class="control-select" aria-label="Provider account"></select>
          <select id="model-select" class="control-select" aria-label="Model selection"></select>
        </div>
        <div class="topbar-group right">
          <span id="run-pill" class="status-pill muted">Idle</span>
          <button id="memory-window" class="icon-button ghost" type="button">Memory</button>
          <button id="keys-button" class="icon-button ghost" type="button">Keys</button>
        </div>
      </header>

      <section id="thread" class="thread" aria-live="polite"></section>

      <footer class="composer-shell">
        <div id="composer-hint" class="composer-hint">Describe a browser task to start planning.</div>
        <div class="composer">
          <textarea id="prompt-input" rows="2" placeholder="Ask the agent to browse, compare, collect, or fill a web workflow."></textarea>
          <div class="composer-actions">
            <button id="send-prompt" class="primary" type="button">Send</button>
          </div>
        </div>
      </footer>

      <div id="account-sheet" class="sheet-backdrop" hidden>
        <section class="sheet">
          <div class="sheet-header">
            <div>
              <p class="eyebrow">Provider Accounts</p>
              <h2>Manage local keys</h2>
            </div>
            <button id="close-sheet" class="icon-button ghost" type="button" aria-label="Close">Done</button>
          </div>

          <div id="account-list" class="account-list"></div>

          <form id="account-form" class="account-form">
            <div class="field-row">
              <label class="field">
                <span>Provider</span>
                <select id="account-provider">
                  <option value="openai">OpenAI</option>
                  <option value="gemini">Google Gemini</option>
                  <option value="claude">Claude</option>
                  <option value="nvidia">NVIDIA</option>
                </select>
              </label>
              <label class="field">
                <span>Label</span>
                <input id="account-label" type="text" placeholder="Work OpenAI" />
              </label>
            </div>

            <label class="field">
              <span>API key</span>
              <input id="account-key" type="password" placeholder="Paste API key" />
            </label>

            <label class="field">
              <span>Base URL</span>
              <input id="account-base-url" type="text" placeholder="Optional override" />
            </label>

            <div class="field-row">
              <label class="field">
                <span>Max output tokens</span>
                <input id="settings-max-output-tokens" type="number" min="64" step="1" />
              </label>
              <label class="field">
                <span>Prompt suffix</span>
                <input id="settings-prompt-suffix" type="text" placeholder="Optional planning hint" />
              </label>
            </div>

            <div class="sheet-actions">
              <button id="save-account" class="primary" type="submit">Save account</button>
              <button id="refresh-models" class="ghost" type="button">Refresh models</button>
              <span id="sheet-status" class="status-pill muted">Ready</span>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
